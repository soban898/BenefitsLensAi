services:
  - type: web
    name: benefitlens-ai-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npx tsx server/index.ts
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 20.0.0
    healthCheckPath: /health
